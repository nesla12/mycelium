server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Markdown downloads should arrive as UTF-8 text.
    types {
        text/markdown md;
    }
    charset utf-8;

    # Clean URLs: Astro emits /page/index.html. Serve directories and .html.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-cache fingerprinted assets.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/plain text/css application/javascript text/markdown image/svg+xml;
    gzip_min_length 1024;
}
